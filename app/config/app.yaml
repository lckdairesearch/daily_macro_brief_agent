# app/config/app.yaml — non-secret runtime behavior
# All secrets must come from environment variables, not this file.

timezone: Asia/Hong_Kong
data_cutoff_hkt: "08:00"
send_time_hkt: "08:00"
default_mode: sample
output_dir: outputs
cache_dir: .cache
email_enabled: false
max_discovery_items: 30
max_theme_radar_items: 3
dashboard_core_instruments:
  - SPY
  - US10Y
  - USDJPY
  - GOLD
  - WTI
  - VIX
dashboard_max_extra_movers: 4
