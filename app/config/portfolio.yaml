# app/config/portfolio.yaml — Family Office Macro Book (synthetic/demo)
# Assumptions: Multi-generational family office with 10-20 year horizon
# Focus: Wealth preservation, structural themes, inflation protection
# These are prototype assumptions based on typical family office positioning.

disclaimer: "Synthetic family office assumptions for demo. Not real client data."

investment_profile:
  horizon: "10-20 years"
  focus: "wealth preservation, structural trends, inflation hedge"
  risk_tolerance: "moderate, can handle volatility for long-term themes"

core_positions:
  - id: metals_complex_long
    label: "Long Metals Complex (Gold/Silver/Copper)"
    instruments: ["Gold", "Silver", "Copper"]
    direction: long
    rationale: "Monetary debasement hedge"
    sensitivity_tags: ["real_rates", "usd_policy", "monetary_policy"]
    
  - id: agriculture_long  
    label: "Long Agriculture Futures (Grains Complex)"
    instruments: ["Wheat", "Corn", "Soybeans"]
    direction: long
    rationale: "Food security, population growth, climate disruption"
    sensitivity_tags: ["weather", "geopolitics", "fertilizer_costs", "population_growth"]

  - id: duration_short
    label: "Short Long-term US Duration" 
    instruments: ["US 30Y", "US 10Y"]
    direction: short
    rationale: "Fiscal dominance, structural inflation risk"
    sensitivity_tags: ["fiscal_policy", "fed_policy", "inflation_regime", "debt_sustainability"]

tactical_overlays:
  - id: usd_diversification
    label: "Currency Diversification" 
    rationale: "Reduce USD concentration risk"

structural_themes:
  - demographic_shifts
  - monetary_debasement
  - resource_scarcity
  - technological_disruption
  - geopolitical_fragmentation

macro_sensitivities:
  - real_rates
  - usd_policy_regime
  - china_growth_model
  - geopolitical_stability
  - fiscal_sustainability
