# app/config/sources.yaml — data source toggles and scout settings

market:
  primary: alpha_vantage
  supplemental: databento
  move_index: yfinance  # low_reliability flag applied automatically
  hy_oas: fred

calendar:
  provider: investing_com
  endpoint_url: "https://endpoints.investing.com/pd-instruments/v1/calendars/economic/events/occurrences"
  domain_id: 1
  limit: 200
  cache_daily: true
  country_ids: [5, 72, 17, 35, 37, 4]
  filter_countries: ["US", "EU", "DE", "JP", "CN", "GB"]
  filter_importance: ["high", "medium"]

llm:
  provider: litellm
  scout_model: "openai/gpt-5.4"
  synthesis_model: "openai/gpt-5.4"
  x_scout_model: "grok-4"  # grok-4+ required for xAI server-side x_search tool
  temperature: 0.2

scouts:
  news:
    enabled: true

  central_bank:
    enabled: true

  research:
    enabled: true

  x:
    enabled: true

  podcast:
    enabled: true
    listen_notes_lookback_hours: 24
    # content recall via GPT web search (no audio transcription)

delivery:
  provider: sendgrid
  default_enabled: false  # overridden by ENABLE_EMAIL_DELIVERY env var
