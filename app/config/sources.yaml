# app/config/sources.yaml — data source toggles and scout settings

market:
  primary: alpha_vantage
  supplemental: databento
  move_index: yfinance
  hy_oas: fred

calendar:
  provider: investing_com
  endpoint_url: "https://endpoints.investing.com/pd-instruments/v1/calendars/economic/events/occurrences"
  domain_id: 1
  limit: 200
  cache_daily: true
  country_ids: [5, 72, 17, 35, 37, 4]
  filter_countries: ["US", "EU", "DE", "JP", "CN", "GB"]
  filter_importance: ["high", "medium"]

llm:
  provider: litellm
  scout_model: "openai/gpt-5.4"
  synthesis_model: "openai/gpt-5.4"
  x_scout_model: "xai/grok-4-1-fast-reasoning"  # balanced fast reasoning x_search-capable Grok variant
  temperature: 0.2

scouts:
  news:
    enabled: true

  central_bank:
    enabled: true

  research:
    enabled: true

  x:
    enabled: true

  podcast:
    enabled: true
    lookback_hours: 24
    curated_min_episodes: 1
    max_curated_queries: 6
    max_freeflow_queries: 2
    max_relevant_episodes: 5
    # use_transcripts: fetch non-exclusive plain-text transcript when available;
    # falls back to OpenAI web-search recall if no usable transcript.
    use_transcripts: true
    curated_podcasts:
      - name: "Macro Voices"
        priority: 1.0
      - name: "Forward Guidance"
        priority: 1.0
      - name: "Top Traders Unplugged"
        priority: 0.9
      - name: "The Macro Trading Floor"
        priority: 0.9
      - name: "Macro Hive Conversations With Bilal Hafeez"
        priority: 0.8
      - name: "Odd Lots"
        priority: 0.7
    freeflow_search_terms:
      - "global macro"
      - "Federal Reserve"
      - "central bank"
      - "inflation"
      - "interest rates"
      - "bond market"
      - "emerging markets"
      - "commodities"

delivery:
  provider: postmark
  default_enabled: false  # overridden by ENABLE_EMAIL_DELIVERY env var
