# app/config/themes.yaml — Family Office structural themes for evidence ranking

themes:
  - id: monetary_debasement
    label: "Monetary debasement and fiscal dominance"
    keywords: ["Fed", "FOMC", "monetary policy", "fiscal dominance", "debt sustainability", "debasement", "Treasury", "duration"]
    portfolio_relevance: ["metals_complex_long", "duration_short"]

  - id: metals_complex
    label: "Metals complex as monetary hedge"
    keywords: ["gold", "silver", "copper", "precious metals", "industrial metals", "central bank demand", "real yields"]
    portfolio_relevance: ["metals_complex_long"]

  - id: food_security
    label: "Food security and agricultural supply disruption"
    keywords: ["agriculture", "grains", "wheat", "corn", "soybeans", "food security", "fertilizer", "weather", "geopolitics"]
    portfolio_relevance: ["agriculture_long"]

  - id: currency_diversification
    label: "De-dollarization and currency diversification"
    keywords: ["USD", "dollar", "reserve currency", "BRICS", "de-dollarization", "currency diversification", "bilateral trade"]
    portfolio_relevance: ["usd_diversification"]

  - id: resource_scarcity
    label: "Resource scarcity and population pressure"
    keywords: ["inflation", "resource scarcity", "supply chain", "commodity", "population growth", "demographics"]
    portfolio_relevance: ["metals_complex_long", "agriculture_long"]

  - id: geopolitical_fragmentation
    label: "Geopolitical fragmentation and trade disruption"
    keywords: ["geopolitics", "trade war", "sanctions", "export controls", "supply chain", "strategic competition"]
    portfolio_relevance: ["agriculture_long", "metals_complex_long", "usd_diversification"]

  - id: credit_stress
    label: "Credit stress and risk appetite"
    keywords: ["credit spreads", "HY OAS", "VIX", "MOVE", "volatility", "risk-off", "credit tightening", "default risk"]
    portfolio_relevance: ["duration_short", "metals_complex_long"]
